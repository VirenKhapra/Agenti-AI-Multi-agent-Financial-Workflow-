services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgerflow-postgres
    environment:
      POSTGRES_DB: ledgerflow
      POSTGRES_USER: ledgerflow
      POSTGRES_PASSWORD: ledgerflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerflow -d ledgerflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ledgerflow-backend
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://ledgerflow:ledgerflow@postgres:5432/ledgerflow
      APP_NAME: LedgerFlow Analytics API
      UPLOAD_DIR: /app/storage/uploads
      MAX_PREVIEW_ROWS: 50
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET_KEY: change-this-before-production
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: ledgerflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
